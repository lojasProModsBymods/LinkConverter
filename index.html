<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter Foto em Link</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #1e293b;
            text-align: center;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .info-tamanho {
            text-align: center;
            font-size: 14px;
            color: #16a34a;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .upload-area {
            border: 3px dashed #94a3b8;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .upload-area p {
            color: #475569;
            margin-top: 10px;
            font-size: 15px;
        }

        #preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            margin: 15px auto;
            display: none;
            object-fit: contain;
        }

        .resultado {
            margin-top: 20px;
            display: none;
        }

        .resultado label {
            display: block;
            color: #1e293b;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .link-box {
            display: flex;
            gap: 10px;
        }

        #linkGerado {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            color: #334155;
            outline: none;
            word-break: break-all;
        }

        #linkGerado:focus {
            border-color: #2563eb;
        }

        button {
            padding: 12px 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            white-space: nowrap;
        }

        button:hover {
            background: #1d4ed8;
        }

        .copiado {
            background: #16a34a !important;
        }

        .aviso {
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Foto em Link</h1>
        <p class="info-tamanho">✅ Compacta automaticamente para ficar pequeno!</p>

        <div class="upload-area" id="uploadBtn">
            <h3>Clique aqui para selecionar</h3>
            <p>Ou arraste a foto para dentro desta área</p>
            <input type="file" id="arquivoFoto" accept="image/*" hidden>
        </div>

        <img id="preview" alt="Pré-visualização da foto">

        <div class="resultado" id="areaResultado">
            <label>Link gerado (compacto):</label>
            <div class="link-box">
                <input type="text" id="linkGerado" readonly>
                <button id="btnCopiar">Copiar</button>
            </div>
        </div>

        <p class="aviso">
            Fotos reduzidas até 80% do tamanho original sem perder qualidade.<br>
            Os links funcionam enquanto a página estiver aberta.
        </p>
    </div>

    <script>
        const uploadBtn = document.getElementById('uploadBtn');
        const arquivoFoto = document.getElementById('arquivoFoto');
        const preview = document.getElementById('preview');
        const areaResultado = document.getElementById('areaResultado');
        const linkGerado = document.getElementById('linkGerado');
        const btnCopiar = document.getElementById('btnCopiar');

        // Configurações de compactação
        const CONFIG = {
            larguraMaxima: 1200,  // Largura máxima da foto
            alturaMaxima: 1200,   // Altura máxima da foto
            qualidade: 0.7,       // 70% de qualidade = arquivo bem menor
            formatoSaida: 'image/jpeg'
        };

        // Abrir seletor de arquivos
        uploadBtn.addEventListener('click', () => arquivoFoto.click());

        // Arraste e solte
        uploadBtn.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBtn.style.borderColor = '#2563eb';
            uploadBtn.style.background = '#eff6ff';
        });

        uploadBtn.addEventListener('dragleave', () => {
            uploadBtn.style.borderColor = '#94a3b8';
            uploadBtn.style.background = 'transparent';
        });

        uploadBtn.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBtn.style.borderColor = '#94a3b8';
            uploadBtn.style.background = 'transparent';
            if (e.dataTransfer.files.length) {
                processarArquivo(e.dataTransfer.files[0]);
            }
        });

        // Processar foto selecionada
        arquivoFoto.addEventListener('change', (e) => {
            if (e.target.files.length) {
                processarArquivo(e.target.files[0]);
            }
        });

        function processarArquivo(arquivo) {
            if (!arquivo.type.startsWith('image/')) {
                alert('Por favor, selecione apenas arquivos de imagem!');
                return;
            }

            const leitor = new FileReader();
            leitor.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    // Calcular novo tamanho mantendo proporção
                    let novaLargura = img.width;
                    let novaAltura = img.height;

                    if (novaLargura > CONFIG.larguraMaxima) {
                        const proporcao = CONFIG.larguraMaxima / novaLargura;
                        novaLargura = CONFIG.larguraMaxima;
                        novaAltura = novaAltura * proporcao;
                    }
                    if (novaAltura > CONFIG.alturaMaxima) {
                        const proporcao = CONFIG.alturaMaxima / novaAltura;
                        novaAltura = CONFIG.alturaMaxima;
                        novaLargura = novaLargura * proporcao;
                    }

                    // Desenhar foto compactada no canvas
                    const canvas = document.createElement('canvas');
                    canvas.width = novaLargura;
                    canvas.height = novaAltura;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, novaLargura, novaAltura);

                    // Gerar link compacto
                    canvas.toBlob((blob) => {
                        const urlCompacta = URL.createObjectURL(blob);
                        
                        // Mostrar pré-visualização
                        preview.src = urlCompacta;
                        preview.style.display = 'block';

                        // Mostrar link menor
                        linkGerado.value = urlCompacta;
                        areaResultado.style.display = 'block';
                    }, CONFIG.formatoSaida, CONFIG.qualidade);
                };
                img.src = e.target.result;
            };
            leitor.readAsDataURL(arquivo);
        }

        // Copiar link
        btnCopiar.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(linkGerado.value);
                btnCopiar.textContent = 'Copiado!';
                btnCopiar.classList.add('copiado');

                setTimeout(() => {
                    btnCopiar.textContent = 'Copiar';
                    btnCopiar.classList.remove('copiado');
                }, 2500);
            } catch (erro) {
                alert('Não foi possível copiar automaticamente: selecione e copie o link manualmente.');
            }
        });
    </script>
</body>
</html>
